services:
  bot:
    build: .
    container_name: market-heat-signal-bot-dev
    command: watchfiles "python -m app.main" app
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./storage:/app/storage:ro
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
    restart: unless-stopped
  web:
    build: .
    container_name: market-heat-signal-bot-web-dev
    command: watchfiles "python -m app.web.main" app
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    env_file:
      - .env
    restart: unless-stopped
