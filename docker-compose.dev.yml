services:
  bot:
    build: .
    container_name: market-heat-signal-bot-dev
    command: watchfiles "python -m app.main" app
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
      - ./storage:/app/storage:ro
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
    restart: unless-stopped
  web:
    build: .
    container_name: market-heat-signal-bot-web-dev
    command: watchfiles "uvicorn app.web.main:app --host 0.0.0.0 --port 8080" app
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
  worker:
    build: .
    container_name: market-heat-signal-bot-worker-dev
    command: watchfiles "python -m app.jobs.runner" app
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import time; p=Path('/app/data/worker_heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime < 120 else 1)",
        ]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
  nginx:
    image: nginx:1.27-alpine
    container_name: market-heat-signal-bot-nginx-dev
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "9443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
