<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход · Market Heat Radar</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="icon" href="data:,">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1>Market Heat Radar</h1>
        <p class="muted">Войдите, чтобы открыть панель управления ботом.</p>
        {% if not configured %}
          <p class="error">Не заданы переменные WEB_USERNAME и WEB_PASSWORD.</p>
        {% elif error == "invalid" %}
          <p class="error">Неверный логин или пароль.</p>
        {% elif error == "not_configured" %}
          <p class="error">Учётные данные для входа не настроены.</p>
        {% endif %}
        <form method="post" action="/login" class="stack">
          <input type="hidden" name="next" value="{{ next }}">
          <label>
            <span class="muted">Логин</span>
            <input name="username" autocomplete="username" required>
          </label>
          <label>
            <span class="muted">Пароль</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Войти</button>
        </form>
      </section>
    </main>
  </body>
</html>
