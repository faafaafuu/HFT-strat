<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Market Heat Radar{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="icon" href="data:,">
    <script src="/static/vendor/htmx.min.js" defer></script>
    <script src="/static/vendor/chart.umd.min.js" defer></script>
    <!-- chartjs-plugin-zoom drives panning through Hammer, so it must load first. -->
    <script src="/static/vendor/hammer.min.js" defer></script>
    <script src="/static/vendor/chartjs-plugin-zoom.min.js" defer></script>
    <script src="/static/js/app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand"><span class="brand-mark">M</span> Heat Radar</div>
        <nav class="nav">
          <a class="{{ 'active' if page == 'dashboard' else '' }}" href="/">Сводка</a>
          <a class="{{ 'active' if page == 'signals' else '' }}" href="/signals">Сигналы</a>
          <a class="{{ 'active' if page == 'paper' else '' }}" href="/paper">Paper-торговля</a>
          <a class="{{ 'active' if page == 'trades' else '' }}" href="/trades">Сделки</a>
          <a class="{{ 'active' if page == 'chart' else '' }}" href="/chart">График по активу</a>
          <a class="{{ 'active' if page == 'analytics' else '' }}" href="/analytics">Аналитика</a>
          <a class="{{ 'active' if page == 'strategy_lab' else '' }}" href="/strategy-lab">Лаборатория</a>
          <a class="{{ 'active' if page == 'performance' else '' }}" href="/performance">Производительность</a>
        </nav>
        <form method="post" action="/logout" class="logout-form">
          <button type="submit">Выйти</button>
        </form>
      </aside>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
    <div id="htmx-indicator" class="global-indicator">Загрузка…</div>
  </body>
</html>
