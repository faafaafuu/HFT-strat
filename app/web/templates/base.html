<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Market Heat Radar</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">Market Heat Radar</div>
        <nav class="nav">
          <a class="{{ 'active' if page == 'dashboard' else '' }}" href="/">Dashboard</a>
          <a class="{{ 'active' if page == 'signals' else '' }}" href="/signals">Signals</a>
          <a class="{{ 'active' if page == 'paper' else '' }}" href="/paper">Paper</a>
          <a class="{{ 'active' if page == 'trades' else '' }}" href="/trades">Trades</a>
          <a class="{{ 'active' if page == 'analytics' else '' }}" href="/analytics">Analytics</a>
          <a class="{{ 'active' if page == 'strategy_lab' else '' }}" href="/strategy-lab">Strategy Lab</a>
          <a class="{{ 'active' if page == 'performance' else '' }}" href="/performance">Performance</a>
        </nav>
      </aside>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
