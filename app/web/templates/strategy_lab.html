{% extends "base.html" %}
{% block title %}Лаборатория стратегий{% endblock %}
{% block content %}
<div class="top">
  <h1>Лаборатория стратегий</h1>
  <span class="muted">Стратегии, плотности, бэктесты, гипероптимизация, ML</span>
</div>

<nav class="tabs" id="lab-tabs">
  {% for key, label in sections %}
  <a class="{{ 'active' if key == section else '' }}"
     href="/strategy-lab{{ '' if key == 'overview' else '/' + key }}"
     hx-get="/strategy-lab/{{ key }}"
     hx-target="#lab-body"
     hx-swap="innerHTML"
     hx-push-url="/strategy-lab{{ '' if key == 'overview' else '/' + key }}"
     hx-indicator="#lab-body">{{ label }}</a>
  {% endfor %}
</nav>

<div id="lab-body" class="lab-body">
  {% include "lab/" + section + ".html" %}
</div>
{% endblock %}
