app:
  mode: paper_trading
  log_level: INFO

telegram:
  enabled: true
  notifications_enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  allowed_user_ids_env: TELEGRAM_ALLOWED_USER_IDS

exchanges:
  bybit:
    enabled: true
    market_type: linear
    testnet: false
    ws_topics_per_connection: 20
    orderbook_depth_limit: 100
    orderbook_process_interval_ms: 250
  hyperliquid:
    enabled: false
    testnet: false

symbols:
  auto_select: true
  max_symbols: 30
  min_24h_volume_usd: 20000000
  max_spread_pct: 0.05
  min_orderbook_depth_usd_1pct: 500000
  exchanges:
    - bybit
  manual_list:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT

signals:
  min_score: 6
  strong_score: 8
  cooldown_minutes_per_symbol: 20

thresholds:
  price_change_5m_pct: 0.7
  oi_change_15m_pct: 2.0
  volume_spike_multiplier: 1.5
  sweep_lookback_minutes: 30
  sweep_return_minutes: 5
  density_min_usd: 500000
  density_max_distance_pct: 0.3
  density_min_lifetime_sec: 10
  funding_extreme_pct: 0.03

outcomes:
  horizons_minutes: [5, 15, 30, 60, 180]
  tp_levels_pct: [0.5, 1.0, 1.5]
  sl_levels_pct: [0.3, 0.5, 0.7]

strategy_profiles:
  profiles:
    scalping_safe:
      enabled: true
      strategies:
        - stop_hunt_sweep
        - micro_stop_hunt_reclaim
        - failed_breakout_fade
      min_score: 8
      symbols: auto
      paper_profile: conservative
    scalping_aggressive:
      enabled: true
      strategies:
        - oi_pump_price_move
        - micro_stop_hunt_reclaim
        - oi_momentum_scalper
        - trend_pullback_scalper
      min_score: 7
      symbols: auto
      paper_profile: aggressive

strategy_instances:
  instances:
    density_conservative:
      strategy_key: density_strategy
      enabled: true
      min_score: 8
      paper_profile: conservative
      symbols: auto
      config:
        min_density_usd: 1000000
        max_distance_pct: 0.25
        min_lifetime_sec: 20
        require_absorption: true
        require_trend_alignment: true
    density_aggressive:
      strategy_key: density_strategy
      enabled: true
      min_score: 7
      paper_profile: aggressive
      symbols: auto
      config:
        min_density_usd: 500000
        max_distance_pct: 0.4
        min_lifetime_sec: 8
        require_absorption: false
        require_trend_alignment: false
    # Backtest-only for now: the live feature store keeps ticks, not candles, so this
    # strategy has no channel to build outside the backtest engine.
    channel_4_touch_backtest:
      strategy_key: channel_4_touch
      enabled: false
      min_score: 6
      paper_profile: conservative
      symbols: auto
      config:
        stop_pct: 1.0
        max_stop_pct: 1.5
        take_pct: 4.0
        min_rr: 2.0

density_strategy:
  enabled: true
  min_density_usd: 500000
  max_distance_pct: 0.35
  min_lifetime_sec: 10
  large_density_multiplier: 3.0
  relative_to_avg_depth: true
  require_volume_spike: true
  volume_spike_multiplier: 1.3
  require_absorption: false
  absorption_min_trades_usd: 200000
  absorption_price_move_max_pct: 0.08
  spoof_detection:
    enabled: true
    pull_threshold_pct: 70
    pull_time_window_sec: 5
  eaten_detection:
    enabled: true
    eaten_threshold_pct: 70
    confirm_move_pct: 0.15
    confirm_window_sec: 20
  risk:
    stop_behind_density_pct: 0.15
    take_profit_rr: 2.0
    max_holding_minutes: 60

channel_strategy:
  enabled: true
  pivot_lookback: 3
  min_bars_between_points: 5
  min_bars_before_touch: 5
  max_bars_wait_touch: 60
  touch_tolerance_pct: 0.1
  breakout_buffer_pct: 0.1
  stop_pct: 1.0
  max_stop_pct: 1.5
  stop_buffer_pct: 0.05
  take_pct: 4.0
  min_rr: 2.0
  history_candles: 240

backtest:
  min_trades: 50
  default_days: 30
  taker_fee_pct: 0.055
  slippage_pct: 0.01
  backtest_mode: candles_only

web:
  session_secret_env: WEB_SESSION_SECRET
  session_cookie_name: mh_session
  session_cookie_secure: false
  session_cookie_same_site: lax
  session_max_age_seconds: 86400

storage:
  data_dir: /app/data
  logs_dir: /app/logs
  backups_dir: /app/backups
  persist_market_snapshots: true
  market_snapshot_interval_sec: 60
  keep_raw_ticks_minutes: 30
  keep_orderbook_events_days: 30
  keep_market_snapshots_days: 90
  max_price_points_per_symbol: 3000
  max_trade_points_per_symbol: 3000
  max_oi_points_per_symbol: 1000
  backup_interval_hours: 24
  strategy_analysis_interval_hours: 24

paper:
  enabled: true
  default_profile: aggressive
  profiles:
    conservative:
      name: Conservative
      enabled: true
      initial_balance: 2000
      min_score: 8
      risk_per_trade_pct: 0.3
      leverage: 3
      stop_loss_pct: 0.4
      take_profit_pct: 1.2
      max_open_positions: 2
      max_positions_per_symbol: 1
      max_daily_loss_pct: 2
      max_holding_minutes: 180
      breakeven_enabled: true
      breakeven_activation_rr: 1.0
      trailing_enabled: true
      trailing_activation_rr: 1.5
      trailing_distance_pct: 0.3
      allowed_patterns: []
      allowed_symbols: []
      blocked_symbols: []
    aggressive:
      name: Aggressive
      enabled: true
      initial_balance: 2000
      min_score: 7
      risk_per_trade_pct: 0.7
      leverage: 7
      stop_loss_pct: 0.5
      take_profit_pct: 1.5
      max_open_positions: 3
      max_positions_per_symbol: 1
      max_daily_loss_pct: 3
      max_holding_minutes: 180
      breakeven_enabled: true
      breakeven_activation_rr: 1.0
      trailing_enabled: true
      trailing_activation_rr: 1.5
      trailing_distance_pct: 0.4
      allowed_patterns: []
      allowed_symbols: []
      blocked_symbols: []
    experimental:
      name: Experimental
      enabled: false
      initial_balance: 500
      min_score: 6
      risk_per_trade_pct: 1.0
      leverage: 10
      stop_loss_pct: 0.7
      take_profit_pct: 2.0
      max_open_positions: 5
      max_positions_per_symbol: 1
      max_daily_loss_pct: 5
      max_holding_minutes: 120
      breakeven_enabled: false
      breakeven_activation_rr: 1.0
      trailing_enabled: true
      trailing_activation_rr: 1.3
      trailing_distance_pct: 0.5
      allowed_patterns: []
      allowed_symbols: []
      blocked_symbols: []
  initial_balance: 2000
  leverage: 5
  risk_per_trade_pct: 0.5
  max_open_positions: 3
  stop_pct: 0.5
  take_pct: 1.5
  auto_trade_min_score: 7
  partial_tp:
    enabled: true
    first_tp_pct: 50
    first_target_rr: 1
  trailing:
    enabled: true
    activation_rr: 1
    distance_pct: 0.4
  taker_fee_pct: 0.055
  maker_fee_pct: 0.02
  slippage_pct: 0.01

database:
  url: sqlite+aiosqlite:////app/data/bot.sqlite3
