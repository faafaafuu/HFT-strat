services:
  market-heat-signal-bot:
    build: .
    container_name: market-heat-signal-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - market_storage:/app/storage
      - market_logs:/app/logs

volumes:
  market_storage:
  market_logs:
