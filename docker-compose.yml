services:
  bot:
    build: .
    container_name: market-heat-signal-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./storage:/app/storage:ro
  web:
    build: .
    container_name: market-heat-signal-bot-web
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
