services:
  market-heat-signal-bot:
    build: .
    container_name: market-heat-signal-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./storage:/app/storage:ro
