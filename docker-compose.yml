services:
  bot:
    build: .
    container_name: market-heat-signal-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
      - ./storage:/app/storage:ro
  web:
    build: .
    container_name: market-heat-signal-bot-web
    command: uvicorn app.web.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_HOST: 0.0.0.0
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
  worker:
    build: .
    container_name: market-heat-signal-bot-worker
    command: python -m app.jobs.runner
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./models:/app/models
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from pathlib import Path; import time; p=Path('/app/data/worker_heartbeat'); raise SystemExit(0 if p.exists() and time.time()-p.stat().st_mtime < 120 else 1)",
        ]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
  nginx:
    image: nginx:1.27-alpine
    container_name: market-heat-signal-bot-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "9443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
